<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Freepik Magazine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      gap: 2px;
      padding: 24px 0 0;
      border-bottom: 1px solid #e9e9e9;
    }

    .tab {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #999;
      padding: 8px 14px;
      cursor: pointer;
      position: relative;
      transition: color 0.15s;
    }

    .tab:hover { color: #1a1a1a; }

    .tab.active {
      color: #1a1a1a;
      font-weight: 500;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: #1a1a1a;
      border-radius: 2px 2px 0 0;
    }

    .viewer-area {
      padding: 20px 0 32px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .iframe-wrapper {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 80vh;
      border: 1px solid #e9e9e9;
      border-radius: 8px;
      overflow: hidden;
      background: #fafafa;
    }

    .iframe-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #fafafa;
      z-index: 2;
      transition: opacity 0.2s;
    }

    .loading.hidden { opacity: 0; pointer-events: none; }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="tabs" id="tabs"></div>

    <div class="viewer-area">
      <div class="iframe-wrapper">
        <div class="loading" id="loading">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <iframe id="frame" allowfullscreen></iframe>
      </div>
    </div>

  </div>

  <script>
    const issues = [
      { label: 'Issue 01', url: 'https://silviasalvador.github.io/freepik_magazine_issue_1/freepik-magazine-flipbook.html' },
      { label: 'Issue 02', url: 'https://silviasalvador.github.io/freepik_magazine_issue_2/freepik-magazine-flipbook.html' },
      { label: 'Issue 03', url: 'https://silviasalvador.github.io/freepik_magazine_issue_3/freepik-magazine-flipbook.html' },
      { label: 'Issue 04', url: 'https://silviasalvador.github.io/freepik_magazine_issue_4/freepik-magazine-flipbook.html' },
    ];

    let current = 0;
    const tabs    = document.getElementById('tabs');
    const frame   = document.getElementById('frame');
    const loading = document.getElementById('loading');

    issues.forEach((issue, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i === 3 ? ' active' : '');
      btn.textContent = issue.label;
      btn.addEventListener('click', () => loadIssue(i));
      tabs.appendChild(btn);
    });

    function loadIssue(index) {
      current = index;
      document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', i === index));
      loading.classList.remove('hidden');
      frame.src = '';
      setTimeout(() => { frame.src = issues[index].url; }, 80);
    }

    frame.addEventListener('load', () => loading.classList.add('hidden'));

    loadIssue(3);
  </script>
</body>
</html>
